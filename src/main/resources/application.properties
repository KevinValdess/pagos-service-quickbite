spring.application.name=PagosServiceQuickBite
server.port=8085

# Base de datos independiente para los pagos
spring.datasource.url=jdbc:mysql://localhost:3306/quickbite_pagos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate se encarga de crear las tablas de transacciones si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway desactivado para mantener la misma línea de desarrollo ágil
spring.flyway.enabled=false